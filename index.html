<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViralScript</title>
<meta name="description" content="Turn any video into a viral YouTube Shorts script instantly using AI. Upload clips and generate high-retention scripts in seconds.">
<meta name="keywords" content="AI script generator, viral script, YouTube Shorts AI, TikTok script generator, video script AI">
<meta name="author" content="ViralScript">
<link rel="icon" type="image/png" href="logo.png">



<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">




<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>




<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">




<style>
body {
  font-family: 'Inter', sans-serif;
}
.gradient-text {
  background: linear-gradient(135deg,#FF6321,#FF9E66);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.btn {
  background: linear-gradient(135deg,#FF6321,#E64A19);
  transition: 0.3s;
}
.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(255,99,33,0.3);
}
</style>
</head>




<body class="bg-[#FDFCF9] text-[#0F172A]">




<!-- HEADER -->
<header class="max-w-6xl mx-auto px-6 py-6 flex justify-between items-center">
  <div class="flex items-center gap-2">
    <div class="bg-[#FF6321] w-10 h-10 rounded-xl flex items-center justify-center text-white">
      <i class="fas fa-play"></i>
    </div>
    <h1 class="font-bold text-xl">ViralScript</h1>
  </div>
</header>




<!-- HERO -->
<section class="text-center px-6 mt-10">
  <p class="text-sm text-orange-500 font-semibold mb-4">AI-Powered Script Generator</p>




  <h2 class="text-4xl md:text-6xl font-extrabold leading-tight mb-6">
    Turn Any Video Into a <br>
    <span class="gradient-text">Viral Script</span>
  </h2>




  <p class="text-gray-500 max-w-xl mx-auto mb-10">
    Upload a clip. Get a high-retention YouTube script instantly.
  </p>
</section>




<!-- UPLOAD BOX -->
<section class="flex justify-center px-6 mt-10">
  <div class="bg-white p-8 rounded-3xl shadow-lg w-full max-w-lg text-center">




    <h3 class="text-xl font-bold mb-4">Upload Your Video</h3>




    <input type="file" id="video" class="mb-4">




    <button id="generate" class="btn text-white px-6 py-3 rounded-xl font-bold w-full">
      Generate Script
    </button>




    <p id="status" class="mt-4 text-sm text-gray-500"></p>




    <div id="resultBox" class="hidden mt-6 text-left">
      <p class="text-sm text-green-500 font-semibold mb-2">Script Generated</p>




      <div id="result" class="text-gray-700"></div>




      <button id="copyBtn" class="mt-4 w-full border rounded-xl py-2">
        Copy Script
      </button>
    </div>




  </div>
</section>




<!-- FOOTER -->
<footer class="mt-20 text-center pb-10">
  <p class="text-gray-400 mb-4">Follow me on</p>




  <div class="flex justify-center gap-5 text-xl text-gray-500">
    <i class="fab fa-youtube"></i>
    <i class="fab fa-instagram"></i>
    <i class="fab fa-tiktok"></i>
    <i class="fab fa-twitter"></i>
    <i class="fab fa-discord"></i>
  </div>




  <p class="text-xs text-gray-400 mt-6">
    ViralScript • No login required • Free
  </p>
</footer>




<script>
const btn = document.getElementById("generate");
const status = document.getElementById("status");
const resultBox = document.getElementById("resultBox");
const result = document.getElementById("result");
const copyBtn = document.getElementById("copyBtn");




btn.onclick = async () => {
  const file = document.getElementById("video").files[0];
  if (!file) {
    alert("Select video");
    return;
  }




  status.innerText = "Uploading...";




  const formData = new FormData();
  formData.append("video", file);




  try {
    const res = await fetch("https://viral-script-backend.onrender.com/api/generate-script", {
      method: "POST",
      body: formData
    });




    const rawText = await res.text();
console.log(rawText);

const data = JSON.parse(rawText);




    status.innerText = "Done ✅";




    if (data.script) {
      resultBox.classList.remove("hidden");
      result.innerText = data.script;
    }




  } catch (err) {
    status.innerText = "Error ❌";
    console.log(err);
  }
};




copyBtn.onclick = () => {
  navigator.clipboard.writeText(result.innerText);
  copyBtn.innerText = "Copied ✅";




  setTimeout(() => {
    copyBtn.innerText = "Copy Script";
  }, 2000);
};
</script>




</body>
</html>
